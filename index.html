<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oslo con Ají – Peruvian Catering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment: #f2e8d5;
      --parchment-light: #f8f2e6;
      --burgundy: #7a1518;
      --burgundy-dark: #5c0f11;
      --gold: #b8880f;
      --gold-light: #d4a520;
      --gold-pale: #e8d090;
      --navy: #1a2d5a;
      --text: #1e1008;
      --text-muted: #6b4c32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--parchment);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* FLAG STRIPE */
    .flag-stripe { display: flex; height: 10px; width: 100%; }
    .flag-stripe .r { background: #c8102e; flex: 1; }
    .flag-stripe .w { background: #fff; flex: 1; }

    /* HEADER */
    header {
      width: 100%;
      background: var(--parchment-light);
      border-bottom: 2px solid var(--gold);
      text-align: center;
      padding: 40px 24px 36px;
      position: relative;
    }
    header::before, header::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 16px;
      background: repeating-linear-gradient(
        180deg,
        #7a1518 0px,#7a1518 6px,
        #b8880f 6px,#b8880f 10px,
        #1a2d5a 10px,#1a2d5a 14px,
        #b8880f 14px,#b8880f 18px,
        #7a1518 18px,#7a1518 24px,
        #f2e8d5 24px,#f2e8d5 28px
      );
    }
    header::before { left: 0; }
    header::after  { right: 0; }

    .logo-img {
      width: clamp(160px, 26vw, 220px);
      height: auto;
      display: block;
      margin: 0 auto;
      mix-blend-mode: multiply;
    }

    /* MAIN */
    main {
      width: 100%;
      max-width: 860px;
      padding: 56px 24px 80px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* EVENT CARD */
    .event-card {
      width: 100%;
      background: var(--burgundy);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(90,10,10,0.22);
      border: 1px solid var(--gold);
      text-decoration: none;
      display: block;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 50px rgba(90,10,10,0.30);
    }

    .event-card-top {
      padding: 36px 40px 28px;
      text-align: center;
      border-bottom: 1px solid rgba(184,136,15,0.35);
      position: relative;
    }

    .event-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-pale);
      opacity: 0.75;
      margin-bottom: 14px;
    }

    .event-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 7vw, 60px);
      font-style: italic;
      color: var(--gold-pale);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .event-subtitle {
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(232,208,144,0.65);
      margin-bottom: 20px;
    }

    .gold-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 280px;
      margin: 0 auto;
    }
    .gold-divider::before, .gold-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .gold-divider span { color: var(--gold); font-size: 12px; }

    .event-tagline {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 16px;
      color: rgba(255,255,255,0.65);
      margin-top: 18px;
    }

    .event-card-bottom {
      padding: 24px 40px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .event-meta {
      font-family: 'Lora', serif;
      font-size: 14px;
      color: rgba(232,208,144,0.85);
      line-height: 1.9;
    }
    .event-meta strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--gold-pale);
      font-weight: 400;
      margin-bottom: 2px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 6px;
      text-decoration: none;
      border-bottom: 3px solid #8a6108;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .cta-btn:hover { background: var(--gold-light); }
    .cta-btn svg { flex-shrink: 0; }

    /* FOOTER */
    footer {
      width: 100%;
      text-align: center;
      padding: 20px;
      font-family: 'EB Garamond', serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-top: 1px solid #d4b896;
      background: var(--parchment-light);
    }

    @media (max-width: 560px) {
      .event-card-top { padding: 28px 24px 22px; }
      .event-card-bottom { padding: 20px 24px 24px; flex-direction: column; align-items: flex-start; }
      .cta-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="flag-stripe"><div class="r"></div><div class="w"></div><div class="r"></div></div>

<header>
  <img class="logo-img" src="images/logo.jpg" alt="Oslo con Ají – Peruvian Catering">
</header>

<main>
  <a class="event-card" href="/penacriolla2026/">

    <div class="event-card-top">
      <div class="event-eyebrow">Next event</div>
      <div class="event-name">Peña Criolla</div>
      <div class="event-subtitle">Peruvian National Holidays 2026</div>
      <div class="gold-divider"><span>✦</span></div>
      <div class="event-tagline">From Lima, in the heart of Oslo.</div>
    </div>

    <div class="event-card-bottom">
      <div class="event-meta">
        <strong>📅 Sunday 26 July 2026</strong>
        From 12:00<br>
        📍 Kjøkken &amp; Bar, Møllergata 16, Oslo
      </div>
      <span class="cta-btn">
        Pre-order food &amp; drinks
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </span>
    </div>

  </a>
</main>

<footer>
  Oslo con Ají &nbsp;·&nbsp; Peruvian Catering &nbsp;·&nbsp; osloconaji@gmail.com
</footer>

</body>
</html>
